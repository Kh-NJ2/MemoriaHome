<!DOCTYPE html>
<html>
<head>
<title>MemoriaHome - Sign Up</title>
<link rel="stylesheet" href="../CSS/style.css">
<link href="https://fonts.googleapis.com/css2?family=Judson&display=swap" rel="stylesheet">
</head>

<body>

<header>
<h1><span class="dark">Memoria</span><span class="light">Home</span></h1>
<img src="../Assets/logo1.png">
</header>

<div class="container">

<div class="form-card">

<h2>Sign up</h2>

<form>

<input type="text" placeholder="Name" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<select required>
<option value="">Role</option>
<option>Caregiver</option>
<option>Doctor</option>
<option>Family Member</option>
</select>

<button type="submit">Submit</button>

<p class="link">
<a href="log_in.html">Sign in</a>
</p>

</form>

</div>

<div class="info-card">

<img src="../Assets/img1.png">

<p>
A centralized platform connecting geriatric specialists,
caregivers, and families through real-time patient data,
AI-driven insights, and seamless communication.
</p>

<p class="powered">
Powered by Intelligent Monitoring
</p>

</div>

</div>

<footer>
© All Rights Reserved
</footer>

</body>
</html>
